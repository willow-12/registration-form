<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form id="regForm" action="process.php" method="POST">

        <div class="row">
            <input type="text" name="first_name" id="firstName" placeholder="First Name">
            <input type="text" name="last_name" id="lastName" placeholder="Last Name">

            <select name="department">
                <option value="Computer Science">Computer Science</option>
                <option value="Software Engineering">Software Engineering</option>
            </select>
        </div>

        <div class="row">
            <div>
                <p>Gender</p>
                <input type="radio" name="gender" value="Male"> Male<br>
                <input type="radio" name="gender" value="Female"> Female<br>
                <input type="radio" name="gender" value="Other"> Other
            </div>

            <div>
                <p>Hobbies</p>
                <input type="checkbox" name="hobbies[]" value="Reading"> Reading<br>
                <input type="checkbox" name="hobbies[]" value="Sports"> Sports<br>
                <input type="checkbox" name="hobbies[]" value="Music"> Music<br>
                <input type="checkbox" name="hobbies[]" value="Travel"> Travel
            </div>

            <textarea name="others" placeholder="Others"></textarea>
        </div>

        <div class="buttons">
            <button type="submit">Register</button>
            <button type="reset">Clear</button>
        </div>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
