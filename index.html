<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2 class="glow">Register ✨</h2>

    <form id="regForm" action="process.php" method="POST">

        <input type="text" name="first_name" id="firstName" placeholder="First Name">
        <input type="text" name="last_name" id="lastName" placeholder="Last Name">

        <select name="department">
            <option>Computer Science</option>
            <option>Software Engineering</option>
        </select>

        <div class="group">
            <p>Gender</p>
            <label><input type="radio" name="gender" value="Male"> Male</label>
            <label><input type="radio" name="gender" value="Female"> Female</label>
            <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>

        <div class="group">
            <p>Hobbies</p>
            <label><input type="checkbox" name="hobbies[]" value="Reading"> Reading</label>
            <label><input type="checkbox" name="hobbies[]" value="Sports"> Sports</label>
            <label><input type="checkbox" name="hobbies[]" value="Music"> Music</label>
        </div>

        <textarea name="others" placeholder="Others"></textarea>

        <button type="submit">Register</button>
        <button type="reset" class="clear">Clear</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
